<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kostka Rubika – kolorowanie 2D + solver</title>
  <style>
    body {
      background:#111;
      color:#eee;
      font-family:Arial,sans-serif;
      text-align:center;
      margin:0;
      padding:20px 10px 40px;
    }
    #cube2d {
      display:grid;
      grid-template-columns:repeat(12,26px);
      grid-template-rows:repeat(9,26px);
      gap:2px;
      justify-content:center;
      margin:10px auto;
    }
    .cell {
      width:26px;
      height:26px;
      border-radius:3px;
      border:1px solid #333;
      background:transparent;
      cursor:default;
    }
    .face-cell {
      background:#000;
      cursor:pointer;
    }
    #palette {
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:10px;
    }
    .color-btn {
      width:28px;
      height:28px;
      border-radius:4px;
      border:2px solid #444;
      cursor:pointer;
    }
    .color-btn.active {
      border-color:#fff;
    }
    button {
      padding:8px 16px;
      border-radius:4px;
      border:1px solid #444;
      background:#222;
      color:#eee;
      cursor:pointer;
      margin-top:10px;
    }
    button:hover {
      background:#333;
    }
    #error {
      margin-top:8px;
      color:#ff6666;
      font-size:13px;
      min-height:16px;
    }
    #solution {
      margin-top:8px;
      font-size:13px;
      min-height:16px;
      font-family:monospace;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <h2>Ustaw swoją kostkę, a potem zobacz algorytm ułożenia</h2>

  <!-- 2D siatka -->
  <div id="cube2d"></div>

  <!-- paleta kolorów -->
  <div id="palette">
    <div class="color-btn active" data-color="#ffffff" style="background:white;"></div>
    <div class="color-btn" data-color="#ff0000" style="background:red;"></div>
    <div class="color-btn" data-color="#00ff00" style="background:lime;"></div>
    <div class="color-btn" data-color="#ffff00" style="background:yellow;"></div>
    <div class="color-btn" data-color="#ff8000" style="background:orange;"></div>
    <div class="color-btn" data-color="#0000ff" style="background:blue;"></div>
  </div>

  <button id="solveBtn">Policz rozwiązanie</button>

  <div id="error"></div>
  <div id="solution"></div>

  <!-- solver Kociemba – wersja bez modułów -->
  <script src="https://cdn.jsdelivr.net/gh/cubing/solvers/kociemba.js"></script>

  <script>
    // ---------- 2D siatka ----------
    const cubeEl = document.getElementById("cube2d");
    const gridW = 12, gridH = 9;
    const cells = [];

    const facePositions = { U: [], R: [], F: [], D: [], L: [], B: [] };

    function addFace(face, x, y) {
      for (let dy = 0; dy < 3; dy++) {
        for (let dx = 0; dx < 3; dx++) {
          facePositions[face].push({ gx: x + dx, gy: y + dy });
        }
      }
    }

    // układ siatki:
    //       U
    //   L   F   R   B
    //       D
    addFace("U", 3, 0);
    addFace("L", 0, 3);
    addFace("F", 3, 3);
    addFace("R", 6, 3);
    addFace("B", 9, 3);
    addFace("D", 3, 6);

    for (let gy = 0; gy < gridH; gy++) {
      for (let gx = 0; gx < gridW; gx++) {
        const div = document.createElement("div");
        div.className = "cell";
        div.dataset.gx = gx;
        div.dataset.gy = gy;
        cubeEl.appendChild(div);
        cells.push(div);
      }
    }

    const faceCells = [];
    for (const face of ["U","R","F","D","L","B"]) {
      for (const pos of facePositions[face]) {
        const idx = pos.gy * gridW + pos.gx;
        const cell = cells[idx];
        cell.classList.add("face-cell");
        cell.dataset.face = face;
        faceCells.push(cell);
      }
    }

    // ---------- paleta ----------
    let selectedColor = "#ffffff";
    document.querySelectorAll(".color-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedColor = btn.dataset.color;
        document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    faceCells.forEach(cell => {
      cell.addEventListener("click", () => {
        cell.style.background = selectedColor;
      });
    });

    const errorBox = document.getElementById("error");
    const solutionBox = document.getElementById("solution");

    function setError(msg)   { errorBox.textContent = msg || ""; }
    function setSolution(s)  { solutionBox.textContent = s || ""; }

    function rgb(c) {
      const ctx = document.createElement("canvas").getContext("2d");
      ctx.fillStyle = c || "#000000";
      return ctx.fillStyle;
    }

    function getColor(pos) {
      const idx = pos.gy * gridW + pos.gx;
      return rgb(cells[idx].style.background);
    }

    // automatyczne mapowanie kolorów środków → U,R,F,D,L,B
    function autoMapCenters() {
      const centers = {
        U: getColor(facePositions.U[4]),
        R: getColor(facePositions.R[4]),
        F: getColor(facePositions.F[4]),
        D: getColor(facePositions.D[4]),
        L: getColor(facePositions.L[4]),
        B: getColor(facePositions.B[4]),
      };
      const unique = new Set(Object.values(centers));
      if (unique.size !== 6) return null;
      const map = {};
      for (const f of ["U","R","F","D","L","B"]) {
        map[centers[f]] = f;
      }
      return map;
    }

    function getFacelets() {
      const map = autoMapCenters();
      if (!map) return { error: "Środkowe pola 6 ścian muszą mieć 6 różnych kolorów." };

      const counts = { U:0,R:0,F:0,D:0,L:0,B:0 };
      const result = [];

      for (const face of ["U","R","F","D","L","B"]) {
        for (const pos of facePositions[face]) {
          const idx = pos.gy * gridW + pos.gx;
          const col = rgb(cells[idx].style.background);
          const key = map[col];
          if (!key) return { error: "Użyj tylko kolorów z palety i pokoloruj wszystkie pola." };
          counts[key]++;
          result.push(key);
        }
      }

      for (const f of ["U","R","F","D","L","B"]) {
        if (counts[f] !== 9) {
          return { error: `Kolor ${f} ma ${counts[f]} pól (powinno być 9).` };
        }
      }

      return { facelets: result.join("") };
    }

    document.getElementById("solveBtn").addEventListener("click", () => {
      setError("");
      setSolution("");

      const { error, facelets } = getFacelets();
      if (error) {
        setError(error);
        return;
      }

      try {
        const sol = kociemba.solve(facelets); // globalna funkcja z <script src=...>
        setSolution("Ruchy do ułożenia:\n" + sol);
      } catch (e) {
        console.error(e);
        setError("Układ niemożliwy – sprawdź kolory.");
      }
    });
  </script>
</body>
</html>
