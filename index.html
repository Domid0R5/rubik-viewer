<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Rubik Solver – Standard / Niestandard</title>

<style>
  body {
    background:#111;
    color:#eee;
    font-family:Arial;
    text-align:center;
    padding:20px;
  }

  h2 { margin-bottom:10px; }

  /* Ładna siatka */
  #cube2d {
    display:grid;
    grid-template-columns:repeat(12, 40px);
    grid-template-rows:repeat(9, 40px);
    gap:4px;
    justify-content:center;
    margin:20px auto;
    background:#222;
    padding:12px;
    border-radius:12px;
  }

  .cell {
    width:40px;
    height:40px;
    background:#333;
    border-radius:6px;
    border:2px solid #555;
    transition:0.15s;
  }

  .face {
    cursor:pointer;
    background:#111;
    border:2px solid #777;
  }

  .face:hover {
    border-color:#fff;
    transform:scale(1.12);
  }

  .face:active {
    transform:scale(0.95);
  }

  /* Paleta */
  #palette {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px;
  }

  .color {
    width:32px;
    height:32px;
    border:3px solid #444;
    cursor:pointer;
    border-radius:6px;
  }

  .active {
    border-color:#fff;
  }

  select, button {
    margin-top:10px;
    padding:10px 18px;
    background:#222;
    color:#eee;
    border:1px solid #444;
    border-radius:6px;
    cursor:pointer;
  }

  button:hover {
    background:#333;
  }

  #error { color:#ff6666; margin-top:10px; }
  #solution { margin-top:10px; white-space:pre-wrap; font-family:monospace; }
  #link3d { margin-top:10px; }
  a { color:#6cf; }
</style>
</head>

<body>

<h2>Wybierz typ kostki</h2>

<select id="mode">
  <option value="standard">Kostka standardowa</option>
  <option value="custom">Moja kostka (niestandardowa)</option>
</select>

<div id="cube2d"></div>

<!-- Paleta kolorów -->
<div id="palette">
  <div class="color active" data-color="#ffffff" style="background:white;"></div>
  <div class="color" data-color="#ffff00" style="background:yellow;"></div>
  <div class="color" data-color="#ff0000" style="background:red;"></div>
  <div class="color" data-color="#ff8000" style="background:orange;"></div>
  <div class="color" data-color="#00ff00" style="background:lime;"></div>
  <div class="color" data-color="#0000ff" style="background:blue;"></div>
</div>

<button id="solveBtn">Solve</button>

<div id="error"></div>
<div id="solution"></div>
<div id="link3d"></div>

<!-- Solver Kociemba -->
<script src="https://cdn.jsdelivr.net/gh/cubing/solvers/kociemba.js"></script>

<script>
/* --- GENEROWANIE SIATKI --- */
const gridW=12, gridH=9;
const cube=document.getElementById("cube2d");
const cells=[];
const faces={U:[],R:[],F:[],D:[],L:[],B:[]};

function addFace(f,x,y){
  for(let dy=0;dy<3;dy++){
    for(let dx=0;dx<3;dx++){
      faces[f].push({gx:x+dx,gy:y+dy});
    }
  }
}

addFace("U",3,0);
addFace("L",0,3);
addFace("F",3,3);
addFace("R",6,3);
addFace("B",9,3);
addFace("D",3,6);

for(let gy=0;gy<gridH;gy++){
  for(let gx=0;gx<gridW;gx++){
    const d=document.createElement("div");
    d.className="cell";
    d.dataset.gx=gx;
    d.dataset.gy=gy;
    cube.appendChild(d);
    cells.push(d);
  }
}

for(const f of ["U","R","F","D","L","B"]){
  for(const pos of faces[f]){
    const idx=pos.gy*gridW+pos.gx;
    cells[idx].classList.add("face");
    cells[idx].dataset.face=f;
  }
}

/* --- PALETA --- */
let selected="#ffffff";
document.querySelectorAll(".color").forEach(btn=>{
  btn.onclick=()=>{
    selected=btn.dataset.color;
    document.querySelectorAll(".color").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  };
});

document.querySelectorAll(".face").forEach(c=>{
  c.onclick=()=>c.style.background=selected;
});

/* --- MAPOWANIA --- */
const standard={
  "#ffffff":"U",
  "#ffff00":"D",
  "#00ff00":"F",
  "#0000ff":"B",
  "#ff0000":"R",
  "#ff8000":"L"
};

const custom={
  "#ff8000":"U",
  "#ff0000":"D",
  "#ffffff":"F",
  "#ffff00":"B",
  "#0000ff":"R",
  "#00ff00":"L"
};

function rgb(c){
  const ctx=document.createElement("canvas").getContext("2d");
  ctx.fillStyle=c||"#000";
  return ctx.fillStyle;
}

function getColor(pos){
  const idx=pos.gy*gridW+pos.gx;
  return rgb(cells[idx].style.background);
}

function getFacelets(){
  const mode=document.getElementById("mode").value;
  const map=mode==="standard"?standard:custom;

  const count={U:0,R:0,F:0,D:0,L:0,B:0};
  const out=[];

  for(const f of ["U","R","F","D","L","B"]){
    for(const pos of faces[f]){
      const col=getColor(pos);
      const key=map[col];
      if(!key) return {error:"Użyj tylko kolorów z palety"};
      count[key]++;
      out.push(key);
    }
  }

  for(const k in count){
    if(count[k]!==9) return {error:`Kolor ${k} ma ${count[k]} pól (powinno być 9)`};
  }

  return {facelets:out.join("")};
}

/* --- SOLVER --- */
document.getElementById("solveBtn").onclick=()=>{
  document.getElementById("error").textContent="";
  document.getElementById("solution").textContent="";
  document.getElementById("link3d").textContent="";

  const {error,facelets}=getFacelets();
  if(error){
    document.getElementById("error").textContent=error;
    return;
  }

  try{
    const sol=kociemba.solve(facelets);
    document.getElementById("solution").textContent=sol;

    const url="https://alg.cubing.net/?alg="+encodeURIComponent(sol);
    document.getElementById("link3d").innerHTML=
      `Podgląd 3D: <a href="${url}" target="_blank">otwórz w alg.cubing.net</a>`;
  }catch(e){
    document.getElementById("error").textContent="Układ niemożliwy";
  }
};
</script>

</body>
</html>
